# XcodeGen manifest for MediaRemoteApp.
#
# Generate the Xcode project:
#     brew install xcodegen
#     cd MediaRemoteApp
#     xcodegen generate
#     open MediaRemoteApp.xcodeproj
#
# Requires Xcode 15+ and iOS 17 deployment target (for the @Observable macro).

name: MediaRemoteApp

options:
  bundleIdPrefix: com.ragab
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""         # fill in your Apple developer team id
    PRODUCT_BUNDLE_IDENTIFIER: com.ragab.MediaRemoteApp
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1,2"
    # We ship an explicit Info.plist (Resources/Info.plist) so iOS can pick
    # up CFBundleIconName etc. Leaving GENERATE_INFOPLIST_FILE on makes
    # Xcode materialise a competing auto-generated plist that silently
    # wins — and drops the icon registration. Keep this OFF.
    GENERATE_INFOPLIST_FILE: NO
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel
    from: 0.7.0

targets:
  MediaRemoteApp:
    type: application
    platform: iOS
    sources:
      - Sources
    # Resources/ is intentionally empty right now. Once you drop in your
    # asset catalog (Resources/Assets.xcassets), uncomment the block
    # below and re-run `xcodegen generate`. Info.plist is wired up via
    # `info.path` further down, so you don't need to list it here.
    # resources:
      - path: Resources/Assets.xcassets
    dependencies:
      - package: Citadel
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Media Remote
        CFBundleIconName: AppIcon
        CFBundleIcons:
          CFBundlePrimaryIcon:
            CFBundleIconName: AppIcon
        CFBundleIcons~ipad:
          CFBundlePrimaryIcon:
            CFBundleIconName: AppIcon
        UILaunchStoryboardName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # ATS is left at its defaults — SSH traffic is not subject to
        # ATS, and we don't want to loosen protections for future HTTP
        # use. If you ever add an HTTPS client, no changes needed; for
        # specific HTTP exceptions, add an NSExceptionDomains dict
        # rather than flipping NSAllowsArbitraryLoads.
        NSLocalNetworkUsageDescription: >-
          Media Remote finds your Mac on the local Wi-Fi network so you can
          add it without typing an IP address.
        NSBonjourServices:
          - _ssh._tcp
